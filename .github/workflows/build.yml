name: Build and Release Setup

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    - name: Download json.hpp
      run: |
        New-Item -ItemType Directory -Force -Path ASI_Plugin\libs\json
        Invoke-WebRequest -Uri "https://raw.githubusercontent.com/nlohmann/json/v3.12.0/single_include/nlohmann/json.hpp" -OutFile "ASI_Plugin\libs\json\json.hpp"

    - name: Build C++ ASI
      run: msbuild ASI_Plugin\DuranOverlay.sln /p:Configuration=Release /p:Platform=x86

    - name: Copy ASI to Launcher Root
      run: copy ASI_Plugin\build\Release\DuranOverlay.asi "DuranOverlay.asi"

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore "DuranHelper.csproj"

    - name: Build and Publish Launcher
      run: dotnet publish "DuranHelper.csproj" -c Release -r win-x64 --self-contained false -o publish_output

    - name: Compile Inno Setup
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" DuranHelper.iss

    - name: Create Update Archive
      run: powershell -command "Compress-Archive -Path 'publish_output\*' -DestinationPath 'Output\update.zip' -Force"

    - name: Upload Release Assets
      uses: softprops/action-gh-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          Output/Setup_DuranHelper.exe
          Output/update.zip
