<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 432" width="100%" height="100%" style="background-color: transparent; font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <filter id="hudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#d2a65e" flood-opacity="0.5"/>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#e74c3c" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="activeTabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d399"/>
      <stop offset="100%" stop-color="#d2a65e"/>
    </linearGradient>
    <clipPath id="overlayClip">
      <path d="M 0,12 L 12,0 L 688,0 L 700,12 L 700,420 L 688,432 L 12,432 L 0,420 Z" />
    </clipPath>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#161b22" stroke-width="1.5"/>
    </pattern>
    <style>
      .btn-hover { cursor: pointer; transition: opacity 0.2s ease, filter 0.2s ease; }
      .btn-hover:hover { opacity: 0.8; filter: brightness(1.2); }
      .reset-btn { cursor: pointer; transition: all 0.2s ease; }
      .reset-btn:hover rect { fill: #e74c3c; stroke: #e74c3c; }
      .reset-btn:hover text { fill: #0a0d12; }
      .reset-btn:hover path { stroke: #0a0d12; }
    </style>
  </defs>

  <g clip-path="url(#overlayClip)" filter="url(#hudShadow)">
    <rect width="700" height="432" fill="#0a0d12" opacity="0.92" />
    <rect width="700" height="432" fill="url(#grid)" opacity="0.4"/>
    
    <path d="M 0,12 L 12,0 L 688,0 L 700,12 L 700,420 L 688,432 L 12,432 L 0,420 Z" fill="none" stroke="#30363d" stroke-width="2"/>
    <path d="M 0,12 L 12,0 L 220,0" fill="none" stroke="#d2a65e" stroke-width="2" filter="url(#glowGold)"/>

    <rect x="0" y="0" width="700" height="50" fill="#11151d" opacity="0.8"/>
    <line x1="0" y1="50" x2="700" y2="50" stroke="#1f242e" stroke-width="2"/>

    <text x="20" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#ffffff" letter-spacing="1">DURAN</text>
    <text x="110" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#d2a65e" letter-spacing="1" filter="url(#glowGold)">HELPER</text>
    <rect x="210" y="18" width="34" height="16" rx="4" fill="#e74c3c" opacity="0.15"/>
    <text x="227" y="30" font-size="9" font-weight="bold" fill="#e74c3c" text-anchor="middle" letter-spacing="1">HUD</text>

    <g transform="translate(260, 12)">
      <g transform="translate(0, 0)" cursor="pointer" class="btn-hover">
        <rect x="0" y="0" width="80" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="40" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">ЗАКОНЫ</text>
      </g>
      <g transform="translate(90, 0)" cursor="pointer" class="btn-hover">
        <rect x="0" y="0" width="160" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="80" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">КАЛЬКУЛЯТОР ШТРАФОВ</text>
      </g>
      <g transform="translate(260, 0)" cursor="pointer" class="btn-hover">
        <rect x="0" y="0" width="80" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="40" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">БИНДЕР</text>
      </g>
      <g transform="translate(350, 0)">
        <rect x="0" y="0" width="26" height="26" rx="4" fill="url(#activeTabGrad)" filter="url(#glowGold)"/>
        
        <path d="M 17.4 11.0 H 19.0 V 13.0 H 17.4 L 16.3 14.8 L 17.5 16.0 L 16.1 17.4 L 14.9 16.2 L 13.0 17.3 V 19.0 H 11.0 V 17.3 L 9.1 16.2 L 7.9 17.4 L 6.5 16.0 L 7.7 14.8 L 6.6 13.0 H 5.0 V 11.0 H 6.6 L 7.7 9.2 L 6.5 8.0 L 7.9 6.6 L 9.1 7.8 L 11.0 6.7 V 5.0 H 13.0 V 6.7 L 14.9 7.8 L 16.1 6.6 L 17.5 8.0 L 16.3 9.2 Z M 12.0 9.0 A 3 3 0 0 0 9 12 A 3 3 0 0 0 12 15 A 3 3 0 0 0 15 12 A 3 3 0 0 0 12 9 Z" fill="#080a0f" transform="translate(1, 1) scale(0.9)"/>
      </g>
    </g>

    <g transform="translate(655, 12)" cursor="pointer" class="btn-hover">
      <rect x="0" y="0" width="26" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <line x1="8" y1="8" x2="18" y2="18" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="8" x2="8" y2="18" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
    </g>

    <g transform="translate(20, 65)">
      <rect width="320" height="280" rx="8" fill="#11151d" stroke="#1f242e" stroke-width="1.5"/>
      
      <text x="20" y="25" font-size="11" font-weight="900" fill="#d2a65e" letter-spacing="1">ВИЗУАЛЬНЫЕ НАСТРОЙКИ</text>
      <line x1="20" y1="35" x2="300" y2="35" stroke="#1f242e" stroke-width="1.5"/>

      <g transform="translate(20, 50)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Тема оформления меню</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Цветовая палитра оверлея</text>
        
        <g transform="translate(0, 40)">
          <rect class="btn-hover" width="90" height="28" rx="4" fill="#d2a65e" opacity="0.15"/>
          <rect width="90" height="28" rx="4" fill="none" stroke="#d2a65e" stroke-width="1.5"/>
          <text x="45" y="18" font-size="10" font-weight="bold" fill="#d2a65e" text-anchor="middle">GOLD</text>
          
          <rect class="btn-hover" x="95" width="90" height="28" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
          <text x="140" y="18" font-size="10" font-weight="bold" fill="#8b949e" text-anchor="middle">BLUE</text>
          
          <rect class="btn-hover" x="190" width="90" height="28" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
          <text x="235" y="18" font-size="10" font-weight="bold" fill="#8b949e" text-anchor="middle">DARK</text>
        </g>
      </g>
      <line x1="20" y1="135" x2="300" y2="135" stroke="#1f242e" stroke-width="1"/>

      <g transform="translate(20, 150)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Прозрачность фона</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Затемнение игры за оверлеем</text>
        <text x="280" y="15" font-size="14" font-weight="900" fill="#d2a65e" text-anchor="end">92%</text>
        
        <rect x="0" y="40" width="280" height="6" rx="3" fill="#1f242e"/>
        <rect x="0" y="40" width="250" height="6" rx="3" fill="#d2a65e"/>
        <circle cx="250" cy="43" r="7" fill="#161b22" stroke="#d2a65e" stroke-width="2" cursor="ew-resize"/>
      </g>
      <line x1="20" y1="215" x2="300" y2="215" stroke="#1f242e" stroke-width="1"/>

      <g transform="translate(20, 230)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Масштаб интерфейса</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Размер всех элементов меню</text>
        
        <g transform="translate(190, 8)">
          <rect class="btn-hover" x="0" y="0" width="42" height="24" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
          <text x="21" y="16" font-size="10" font-weight="bold" fill="#8b949e" text-anchor="middle">75%</text>
          
          <rect class="btn-hover" x="48" y="0" width="42" height="24" rx="4" fill="#161b22" stroke="#d2a65e" stroke-width="1.5"/>
          <text x="69" y="16" font-size="10" font-weight="bold" fill="#ffffff" text-anchor="middle">100%</text>
        </g>
      </g>
    </g>

    <g transform="translate(360, 65)">
      <rect width="320" height="280" rx="8" fill="#11151d" stroke="#1f242e" stroke-width="1.5"/>
      
      <text x="20" y="25" font-size="11" font-weight="900" fill="#d2a65e" letter-spacing="1">СИСТЕМА И ПОВЕДЕНИЕ</text>
      <line x1="20" y1="35" x2="300" y2="35" stroke="#1f242e" stroke-width="1.5"/>

      <g transform="translate(20, 50)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Клавиша вызова меню</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Открыть / закрыть оверлей</text>
        <g transform="translate(220, 5)" class="btn-hover">
          <rect width="60" height="26" rx="4" fill="#161b22" stroke="#d2a65e" stroke-width="1.5"/>
          <text x="30" y="17" font-size="12" font-weight="900" fill="#d2a65e" text-anchor="middle">F9</text>
        </g>
      </g>
      <line x1="20" y1="95" x2="300" y2="95" stroke="#1f242e" stroke-width="1"/>

      <g transform="translate(20, 110)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Задержка биндера (Анти-флуд)</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Пауза между отправкой строк в чат</text>
        <text x="280" y="15" font-size="14" font-weight="900" fill="#d2a65e" text-anchor="end">300 мс</text>
        
        <rect x="0" y="40" width="280" height="6" rx="3" fill="#1f242e"/>
        <rect x="0" y="40" width="80" height="6" rx="3" fill="#d2a65e"/>
        <circle cx="80" cy="43" r="7" fill="#161b22" stroke="#d2a65e" stroke-width="2" cursor="ew-resize"/>
      </g>
      <line x1="20" y1="175" x2="300" y2="175" stroke="#1f242e" stroke-width="1"/>

      <g transform="translate(20, 190)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Запоминать вкладку</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Открывать меню на последнем экране</text>
        <g transform="translate(244, 5)" cursor="pointer">
          <rect width="36" height="20" rx="10" fill="#2ea043"/>
          <circle cx="26" cy="10" r="7" fill="#ffffff"/>
        </g>
      </g>
      <line x1="20" y1="230" x2="300" y2="230" stroke="#1f242e" stroke-width="1"/>

      <g transform="translate(20, 245)">
        <text x="0" y="10" font-size="12" font-weight="bold" fill="#ffffff">Уведомления в игре</text>
        <text x="0" y="25" font-size="10" fill="#6b737f">Показывать статус работы в углу</text>
        <g transform="translate(244, 5)" cursor="pointer">
          <rect width="36" height="20" rx="10" fill="#2ea043"/>
          <circle cx="26" cy="10" r="7" fill="#ffffff"/>
        </g>
      </g>
    </g>

    <line x1="20" y1="365" x2="680" y2="365" stroke="#1f242e" stroke-width="1.5"/>
    
    <text x="20" y="392" font-size="11" font-weight="bold" fill="#5c6370">Версия плагина:</text>
    <text x="110" y="392" font-size="11" font-weight="bold" fill="#8b949e">v2.0.0 ASI</text>

    <g transform="translate(490, 375)" class="reset-btn">
      <rect width="190" height="34" rx="6" fill="#11151d" stroke="#e74c3c" stroke-width="1.5"/>
      <path d="M 18 17 A 6 6 0 1 1 14 11 L 14 8 M 14 11 L 17 11" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="108" y="21" font-size="11" font-weight="900" fill="#e74c3c" text-anchor="middle" letter-spacing="0.5">СБРОСИТЬ НАСТРОЙКИ</text>
    </g>

  </g>
</svg>
