<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 432" width="100%" height="100%" style="background-color: transparent; font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <filter id="hudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#d2a65e" flood-opacity="0.5"/>
    </filter>
    <linearGradient id="activeTabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d399"/>
      <stop offset="100%" stop-color="#d2a65e"/>
    </linearGradient>
    <clipPath id="overlayClip">
      <path d="M 0,12 L 12,0 L 688,0 L 700,12 L 700,420 L 688,432 L 12,432 L 0,420 Z" />
    </clipPath>
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#161b22" stroke-width="1.5"/>
    </pattern>
  </defs>

  <g clip-path="url(#overlayClip)" filter="url(#hudShadow)">
    <rect width="700" height="432" fill="#0a0d12" opacity="0.92" />
    <rect width="700" height="432" fill="url(#grid)" opacity="0.4"/>
    <path d="M 0,12 L 12,0 L 688,0 L 700,12 L 700,420 L 688,432 L 12,432 L 0,420 Z" fill="none" stroke="#30363d" stroke-width="2"/>
    <path d="M 0,12 L 12,0 L 220,0" fill="none" stroke="#d2a65e" stroke-width="2" filter="url(#glowGold)"/>

    <rect x="0" y="0" width="700" height="50" fill="#11151d" opacity="0.8"/>
    <line x1="0" y1="50" x2="700" y2="50" stroke="#1f242e" stroke-width="2"/>

    <text x="20" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#ffffff" letter-spacing="1">DURAN</text>
    <text x="110" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#d2a65e" letter-spacing="1" filter="url(#glowGold)">HELPER</text>
    <rect x="210" y="18" width="34" height="16" rx="4" fill="#e74c3c" opacity="0.15"/>
    <text x="227" y="30" font-size="9" font-weight="bold" fill="#e74c3c" text-anchor="middle" letter-spacing="1">HUD</text>

    <g transform="translate(260, 12)">
      <g transform="translate(0, 0)" cursor="pointer">
        <rect x="0" y="0" width="80" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="40" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">ЗАКОНЫ</text>
      </g>
      <g transform="translate(90, 0)">
        <rect x="0" y="0" width="160" height="26" rx="4" fill="url(#activeTabGrad)" filter="url(#glowGold)"/>
        <text x="80" y="17" font-size="11" font-weight="900" fill="#080a0f" text-anchor="middle" letter-spacing="0.5">КАЛЬКУЛЯТОР ШТРАФОВ</text>
      </g>
      <g transform="translate(260, 0)" cursor="pointer">
        <rect x="0" y="0" width="80" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="40" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">БИНДЕР</text>
      </g>
    </g>

    <rect x="655" y="12" width="26" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <line x1="663" y1="20" x2="673" y2="30" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
    <line x1="673" y1="20" x2="663" y2="30" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>

    <rect x="20" y="65" width="390" height="32" rx="6" fill="#11151d" stroke="#1f242e" stroke-width="1.5" opacity="0.5"/>
    <circle cx="35" cy="81" r="4" fill="none" stroke="#6b737f" stroke-width="2" opacity="0.5"/>
    <line x1="38" y1="84" x2="42" y2="88" stroke="#6b737f" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <text x="50" y="86" font-size="12" fill="#4a5059">Поиск недоступен...</text>

    <g transform="translate(215, 230)">
      <circle cx="0" cy="-20" r="30" fill="none" stroke="#1f242e" stroke-width="4"/>
      <path d="M-15 -30 L15 -10 M-15 -10 L15 -30" fill="none" stroke="#30363d" stroke-width="4" stroke-linecap="round"/>
      <text x="0" y="35" font-family="Segoe UI, Arial" font-size="14" font-weight="bold" fill="#8b949e" text-anchor="middle">НЕТ ДОСТУПНЫХ СТАТЕЙ</text>
    </g>

    <g transform="translate(420, 65)">
      <rect x="0" y="0" width="260" height="345" rx="8" fill="#11151d" stroke="#1f242e" stroke-width="1.5"/>
      
      <text x="20" y="25" font-size="12" font-weight="900" fill="#ffffff" letter-spacing="1">ИТОГОВЫЙ ШТРАФ</text>
      <rect x="20" y="35" width="220" height="2" fill="#1f242e"/>
      <rect x="20" y="35" width="20" height="2" fill="#5c6370"/>

      <g transform="translate(130, 90)">
        <text x="0" y="0" font-size="11" font-weight="bold" fill="#5c6370" text-anchor="middle">Список нарушений пуст.</text>
        <text x="0" y="15" font-size="10" fill="#4a5059" text-anchor="middle">Кликните по статьям слева.</text>
      </g>

      <line x1="20" y1="135" x2="240" y2="135" stroke="#30363d" stroke-width="1.5" stroke-dasharray="4 4"/>
      
      <text x="20" y="160" font-size="11" font-weight="bold" fill="#5c6370">ОБЩАЯ СУММА:</text>
      <text x="240" y="162" font-size="22" font-weight="900" fill="#8b949e" text-anchor="end">0 <tspan font-size="12">руб.</tspan></text>

      <rect x="20" y="175" width="220" height="30" rx="4" fill="#11151d" stroke="#1f242e" stroke-width="1"/>
      <rect x="28" y="183" width="12" height="12" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1"/>
      <text x="48" y="193" font-size="9" font-weight="bold" fill="#5c6370">С ИЗЪЯТИЕМ ВОД. УДОСТОВЕРЕНИЯ</text>

      <text x="20" y="230" font-size="10" font-weight="bold" fill="#5c6370" letter-spacing="1">ID НАРУШИТЕЛЯ</text>
      <rect x="20" y="240" width="220" height="34" rx="4" fill="#0a0d12" stroke="#1f242e" stroke-width="1.5"/>
      <text x="35" y="262" font-size="12" fill="#4a5059">ID...</text>

      <rect x="20" y="295" width="70" height="34" rx="4" fill="#11151d" stroke="#1f242e" stroke-width="1.5"/>
      <text x="55" y="316" font-size="10" font-weight="bold" fill="#5c6370" text-anchor="middle">ОЧИСТИТЬ</text>

      <rect x="95" y="295" width="145" height="34" rx="4" fill="#161b22" stroke="#1f242e" stroke-width="1.5"/>
      <text x="167.5" y="317" font-size="11" font-weight="900" fill="#5c6370" text-anchor="middle" letter-spacing="0.5">ВЫПИСАТЬ ШТРАФ</text>
    </g>

  </g>
</svg>
