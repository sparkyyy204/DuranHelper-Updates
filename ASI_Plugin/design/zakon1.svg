<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 432" width="100%" height="100%" style="background-color: transparent; font-family: 'Segoe UI', Arial, sans-serif;">
  <defs>
    <filter id="hudShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
    <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#d2a65e" flood-opacity="0.5"/>
    </filter>
    <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#e74c3c" flood-opacity="0.6"/>
    </filter>
    <linearGradient id="activeTabGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f3d399"/>
      <stop offset="100%" stop-color="#d2a65e"/>
    </linearGradient>
    <clipPath id="overlayClip">
      <path d="M 0,12 L 12,0 L 688,0 L 700,12 L 700,420 L 688,432 L 12,432 L 0,420 Z" />
    </clipPath>
  </defs>

  <g clip-path="url(#overlayClip)" filter="url(#hudShadow)">
    <rect width="700" height="432" fill="#0a0d12" opacity="0.92" />
    <pattern id="grid" width="25" height="25" patternUnits="userSpaceOnUse">
      <path d="M 25 0 L 0 0 0 25" fill="none" stroke="#161b22" stroke-width="1.5"/>
    </pattern>
    <rect width="700" height="432" fill="url(#grid)" opacity="0.4"/>
    <path d="M 0,12 L 12,0 L 688,0 L 700,12 L 700,420 L 688,432 L 12,432 L 0,420 Z" fill="none" stroke="#30363d" stroke-width="2"/>
    <path d="M 0,12 L 12,0 L 220,0" fill="none" stroke="#d2a65e" stroke-width="2" filter="url(#glowGold)"/>

    <rect x="0" y="0" width="700" height="50" fill="#11151d" opacity="0.8"/>
    <line x1="0" y1="50" x2="700" y2="50" stroke="#1f242e" stroke-width="2"/>

    <text x="20" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#ffffff" letter-spacing="1">DURAN</text>
    <text x="110" y="32" font-family="Arial Black, Impact, sans-serif" font-size="20" font-weight="900" fill="#d2a65e" letter-spacing="1" filter="url(#glowGold)">HELPER</text>
    <rect x="210" y="18" width="34" height="16" rx="4" fill="#e74c3c" opacity="0.15"/>
    <text x="227" y="30" font-size="9" font-weight="bold" fill="#e74c3c" text-anchor="middle" letter-spacing="1">HUD</text>

    <g transform="translate(260, 12)">
      <g transform="translate(0, 0)">
        <rect x="0" y="0" width="80" height="26" rx="4" fill="url(#activeTabGrad)" filter="url(#glowGold)"/>
        <text x="40" y="17" font-size="11" font-weight="900" fill="#080a0f" text-anchor="middle" letter-spacing="0.5">ЗАКОНЫ</text>
      </g>
      <g transform="translate(90, 0)" cursor="pointer">
        <rect x="0" y="0" width="160" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="80" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">КАЛЬКУЛЯТОР ШТРАФОВ</text>
      </g>
      <g transform="translate(260, 0)" cursor="pointer">
        <rect x="0" y="0" width="80" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
        <text x="40" y="17" font-size="11" font-weight="bold" fill="#8b949e" text-anchor="middle" letter-spacing="0.5">БИНДЕР</text>
      </g>
    </g>

    <rect x="655" y="12" width="26" height="26" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
    <line x1="663" y1="20" x2="673" y2="30" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>
    <line x1="673" y1="20" x2="663" y2="30" stroke="#8b949e" stroke-width="2" stroke-linecap="round"/>

    <rect x="20" y="65" width="370" height="32" rx="6" fill="#11151d" stroke="#1f242e" stroke-width="1.5"/>
    <circle cx="35" cy="81" r="4" fill="none" stroke="#6b737f" stroke-width="2"/>
    <line x1="38" y1="84" x2="42" y2="88" stroke="#6b737f" stroke-width="2" stroke-linecap="round"/>
    <text x="50" y="86" font-size="12" fill="#6b737f">Поиск статьи или названия...</text>

    <rect x="400" y="65" width="280" height="32" rx="6" fill="#161b22" stroke="#d2a65e" stroke-width="1.5"/>
    <text x="415" y="86" font-size="12" font-weight="bold" fill="#ffffff">Уголовный Кодекс (УК)</text>
    <path d="M 660 78 L 665 84 L 670 78" fill="none" stroke="#d2a65e" stroke-width="2" stroke-linecap="round"/>

    <g transform="translate(20, 115)">
      <text x="0" y="10" font-size="11" font-weight="900" fill="#d2a65e" letter-spacing="0.5">ГЛАВА 1-3. НАПАДЕНИЕ И УБИЙСТВО</text>
      <line x1="0" y1="16" x2="320" y2="16" stroke="#1f242e" stroke-width="1.5"/>

      <g transform="translate(0, 30)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[1.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Нападение на гражд.</text>
        <line x1="160" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">2 г.</text>
      </g>
      <g transform="translate(0, 50)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[1.2]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Нападение на ПО</text>
        <line x1="140" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">4 г.</text>
      </g>
      <g transform="translate(0, 70)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[2.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Воор. нап. на гражд.</text>
        <line x1="155" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">3 г.</text>
      </g>
      <g transform="translate(0, 90)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[2.2]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Воор. нап. на ПО/МО</text>
        <line x1="160" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">5 л.</text>
      </g>

      <text x="0" y="130" font-size="11" font-weight="900" fill="#d2a65e" letter-spacing="0.5">ГЛАВА 4-6. УГОН, ВЗЯТКА</text>
      <line x1="0" y1="136" x2="320" y2="136" stroke="#1f242e" stroke-width="1.5"/>

      <g transform="translate(0, 150)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[4.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Попытка угона ТС</text>
        <line x1="145" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">1 г.</text>
      </g>
      <g transform="translate(0, 170)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[5.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Дача взятки</text>
        <line x1="110" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">1 г.</text>
      </g>
      <g transform="translate(0, 190)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[5.2]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Взятка (Гос)</text>
        <line x1="110" y1="-3" x2="240" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">4г+ЧС+Увал</text>
      </g>
    </g>

    <g transform="translate(360, 115)">
      <text x="0" y="10" font-size="11" font-weight="900" fill="#d2a65e" letter-spacing="0.5">ГЛАВА 7-9. ТЮРЬМА И ЗОТ</text>
      <line x1="0" y1="16" x2="320" y2="16" stroke="#1f242e" stroke-width="1.5"/>

      <g transform="translate(0, 30)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[7.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Взятие заложников</text>
        <line x1="155" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">6 л.</text>
      </g>
      <g transform="translate(0, 50)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[8.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Неподчинение ПО</text>
        <line x1="145" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">1 г.</text>
      </g>
      <g transform="translate(0, 70)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[9.1]</text>
        <text x="35" y="0" font-size="12" font-weight="bold" fill="#ffffff">Проникновение ЗОТ</text>
        <line x1="165" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">2 г.</text>
      </g>

      <text x="0" y="110" font-size="11" font-weight="900" fill="#d2a65e" letter-spacing="0.5">ГЛАВА 10. НАРКОТИКИ</text>
      <line x1="0" y1="116" x2="320" y2="116" stroke="#1f242e" stroke-width="1.5"/>

      <g transform="translate(0, 130)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[10.1]</text>
        <text x="40" y="0" font-size="12" font-weight="bold" fill="#ffffff">Нарко Хранение</text>
        <line x1="140" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">3 г.</text>
      </g>
      <g transform="translate(0, 150)">
        <text x="0" y="0" font-size="12" font-weight="bold" fill="#d2a65e">[10.2]</text>
        <text x="40" y="0" font-size="12" font-weight="bold" fill="#ffffff">Нарко Сбыт</text>
        <line x1="115" y1="-3" x2="290" y2="-3" stroke="#30363d" stroke-dasharray="2 4"/>
        <text x="320" y="0" font-size="11" font-weight="bold" fill="#e74c3c" text-anchor="end">6 л.</text>
      </g>
    </g>

    <rect x="685" y="115" width="4" height="295" rx="2" fill="#11151d"/>
    <rect x="685" y="115" width="4" height="100" rx="2" fill="#d2a65e"/>
  </g>
</svg>
