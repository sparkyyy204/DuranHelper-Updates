<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 650" width="100%" height="100%" style="background-color: transparent;">
  <defs>
    <filter id="glowGoldMajor" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="#d2a65e" flood-opacity="0.8"/>
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#1f6feb" flood-opacity="0.6"/>
    </filter>
    
    <clipPath id="windowClip">
      <path d="M 0,0 L 975,0 A 25,25 0 0,1 1000,25 L 1000,650 L 25,650 A 25,25 0 0,1 0,625 Z" />
    </clipPath>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="1"/>
    </pattern>
    
    <linearGradient id="bgCardMajor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c2128"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>

    <style>
      .btn-hover { transition: filter 0.2s, stroke 0.2s; cursor: pointer; }
      .btn-hover:hover { filter: brightness(1.3); }
      .text-epic { font-family: Segoe UI, Arial; fill: #ffffff; }
      .text-gray { font-family: Segoe UI, Arial; fill: #8b949e; }
      .text-gold { font-family: Segoe UI, Arial; fill: #d2a65e; }
    </style>
  </defs>

  <g clip-path="url(#windowClip)">
    <rect width="1000" height="650" fill="#0d1117" />
    <rect width="1000" height="650" fill="url(#grid)" opacity="0.15"/>

    <g transform="translate(140, 90)" opacity="0.3">
      <text x="0" y="15" font-family="Segoe UI, Arial" font-size="28" font-weight="bold" fill="#ffffff">Инициализация среды DURAN</text>
      
      <g transform="translate(0, 70)">
        <rect width="400" height="280" rx="12" fill="#0c1815" stroke="#2ea043" stroke-width="1.5" opacity="0.5"/>
        <text x="20" y="35" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#2ea043" opacity="0.5">ШАГ 1 ВЫПОЛНЕН</text>
      </g>

      <g transform="translate(420, 70)">
        <rect width="400" height="280" rx="12" fill="#161b22" stroke="#1f6feb" stroke-width="2" opacity="0.5"/>
        <text x="20" y="35" font-family="Segoe UI, Arial" font-size="12" font-weight="bold" fill="#1f6feb" opacity="0.5">ШАГ 2: СОЕДИНЕНИЕ С ИГРОЙ</text>
      </g>
    </g>
    <g transform="translate(170, 75)" filter="url(#glowGoldMajor)">
      <rect width="660" height="500" rx="16" fill="url(#bgCardMajor)" stroke="#d2a65e" stroke-width="2.5"/>
      
      <text x="30" y="45" class="text-gray" font-size="12" font-weight="bold" letter-spacing="2">GLOBAL UPDATE PRESENTATION</text>
      <line x1="30" y1="60" x2="630" y2="60" stroke="#30363d" stroke-width="1"/>
      
      <text x="330" y="110" class="text-epic" font-size="36" font-weight="900" text-anchor="middle" letter-spacing="1">DURAN HELPER <tspan class="text-gold">2.0.0</tspan></text>
      <text x="330" y="145" class="text-epic" font-size="22" font-weight="bold" text-anchor="middle">Добро пожаловать в новую эру!</text>

      <circle cx="330" cy="180" r="15" fill="#0d1117" stroke="#d2a65e" stroke-width="2"/>
      <circle cx="330" cy="180" r="6" fill="#d2a65e"/>

      <g transform="translate(40, 215)" class="text-epic" font-size="14" font-weight="400" line-height="20">
        <text x="310" y="0" text-anchor="middle">Мы провели огромную работу и готовы презентовать совершенно новое</text>
        <text x="310" y="22" text-anchor="middle">понимание о игровом помощнике в сфере <tspan class="text-gold" font-weight="bold">RADMIR RP</tspan>.</text>
        
        <text x="310" y="55" text-anchor="middle">Забудьте об эмуляции нажатий клавиш. Начиная с <tspan font-weight="bold">v2.0.0</tspan>,</text>
        <text x="310" y="77" text-anchor="middle">Хелпер использует <tspan class="text-gold" font-weight="bold">прямое отправление команд в игру через память</tspan>.</text>
      </g>

      <g transform="translate(40, 315)">
        <rect width="580" height="60" rx="8" fill="#1b1612" stroke="#d2a65e" stroke-width="1" stroke-dasharray="6 4" opacity="0.6"/>
        <text x="290" y="26" class="text-epic" font-size="13" font-weight="bold" font-style="italic" text-anchor="middle">
          Пример: Вы буквально сможете пока читаете миранду отстреливаться параллельно
        </text>
        <text x="290" y="46" class="text-epic" font-size="13" font-weight="bold" font-style="italic" text-anchor="middle">
          и открывать игровой чат. Хелпер больше не блокирует управление.
        </text>
      </g>
      
      <g transform="translate(40, 395)">
        <circle cx="20" cy="10" r="15" fill="#121b16" stroke="#2ea043" stroke-width="1.5"/>
        <path d="M12 10 L18 16 L28 4" stroke="#2ea043" stroke-width="3" fill="none" stroke-linecap="round"/>
        <text x="50" y="15" class="text-epic" font-size="14">Весь ваш профиль <tspan class="text-gold" font-weight="bold">сохранен</tspan>.</text>
        <text x="50" y="35" class="text-gray" font-size="12">Лишь проведите простую настройку в два шага, которые увидите далее.</text>
      </g>

      <g transform="translate(205, 450)" class="btn-hover">
        <rect width="250" height="45" rx="8" fill="#d2a65e"/>
        <rect width="250" height="45" rx="8" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
        <text x="125" y="27" class="text-epic" font-size="14" font-weight="900" fill="#0d1117" text-anchor="middle" pointer-events="none" letter-spacing="1">ПРИСТУПИМ!</text>
      </g>
    </g>
    </g>

  <polyline points="0,50 0,0 50,0" fill="none" stroke="#d2a65e" stroke-width="8" stroke-linejoin="miter"/>
  <polyline points="950,650 1000,650 1000,600" fill="none" stroke="#d2a65e" stroke-width="8" stroke-linejoin="miter"/>
</svg>
